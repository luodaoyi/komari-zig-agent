name: Build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  ZIG_VERSION: 0.15.2
  ZIG_SHA256: 02aa270f183da276e5b5920b1dac44a63f1a49e55050ebde3aecc9eb82f93239

jobs:
  native-test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Install Zig
        uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29
        with:
          version: ${{ env.ZIG_VERSION }}
      - name: Test
        run: zig build test

  coverage:
    name: Coverage (Linux)
    runs-on: ubuntu-22.04
    needs: native-test
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Install Zig
        uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29
        with:
          version: ${{ env.ZIG_VERSION }}
      - name: Install kcov
        run: |
          set -eu
          sudo apt-get update
          sudo apt-get install -y kcov
      - name: Collect coverage
        run: |
          set -eu
          rm -rf coverage
          zig build test -Dcoverage=true -Dcoverage-dir="$PWD/coverage/raw"
          kcov --merge "$PWD/coverage/merged" "$PWD"/coverage/raw/*
          python3 scripts/check_coverage.py "$PWD/coverage/merged" 100
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        if: always()
        with:
          name: coverage-linux
          path: coverage/merged
          if-no-files-found: warn

  linux-distro-test:
    name: Linux Distro Test (${{ matrix.name }})
    runs-on: ubuntu-latest
    needs: native-test
    container:
      image: ${{ matrix.image }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: fedora
            image: fedora:latest
          - name: centos-stream
            image: quay.io/centos/centos:stream9
          - name: rocky
            image: rockylinux:9
          - name: alma
            image: almalinux:9
    steps:
      - name: Prepare container
        shell: sh
        run: |
          set -eu
          if command -v dnf >/dev/null 2>&1; then
            dnf -y install bash ca-certificates curl findutils git gzip tar xz
          elif command -v microdnf >/dev/null 2>&1; then
            microdnf -y install bash ca-certificates curl findutils git gzip tar xz
          fi
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Install Zig
        shell: bash
        run: |
          set -eu
          curl -fsSLO "https://ziglang.org/download/${ZIG_VERSION}/zig-x86_64-linux-${ZIG_VERSION}.tar.xz"
          echo "${ZIG_SHA256}  zig-x86_64-linux-${ZIG_VERSION}.tar.xz" | sha256sum -c -
          tar -xf "zig-x86_64-linux-${ZIG_VERSION}.tar.xz"
          echo "$PWD/zig-x86_64-linux-${ZIG_VERSION}" >> "$GITHUB_PATH"
      - name: Test
        shell: bash
        run: zig build test

  linux-appliance-smoke:
    name: Linux Appliance Smoke (${{ matrix.name }})
    runs-on: ubuntu-latest
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: openwrt-x86-64
            image: openwrt/rootfs:x86-64-22.03.2
            target: x86_64-linux-musl
            binary: komari-agent
          - name: synology-dsm-linux-amd64-profile
            image: debian:12-slim
            target: x86_64-linux-musl
            binary: komari-agent
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Install Zig
        run: |
          set -eu
          curl -fsSLO "https://ziglang.org/download/${ZIG_VERSION}/zig-x86_64-linux-${ZIG_VERSION}.tar.xz"
          echo "${ZIG_SHA256}  zig-x86_64-linux-${ZIG_VERSION}.tar.xz" | sha256sum -c -
          tar -xf "zig-x86_64-linux-${ZIG_VERSION}.tar.xz"
          echo "$PWD/zig-x86_64-linux-${ZIG_VERSION}" >> "$GITHUB_PATH"
      - name: Build static Linux binary
        run: |
          set -eu
          zig build -Doptimize=ReleaseSmall -Dversion=dev -Dtarget=${{ matrix.target }}
          cp "zig-out/bin/${{ matrix.binary }}" "./${{ matrix.binary }}"
          chmod +x "./${{ matrix.binary }}"
      - name: Run appliance image smoke
        run: |
          set -eu
          docker run --rm -v "$PWD/${{ matrix.binary }}:/komari-agent:ro" "${{ matrix.image }}" /komari-agent --show-warning

  build:
    runs-on: ubuntu-latest
    needs: [native-test, coverage, linux-distro-test]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            arch: amd64
            target: x86_64-linux-musl
          - os: linux
            arch: arm64
            target: aarch64-linux-musl
          - os: linux
            arch: "386"
            target: x86-linux-musl
          - os: linux
            arch: arm
            target: arm-linux-musleabi
          - os: linux
            arch: mips
            target: mips-linux-musl
          - os: linux
            arch: mipsel
            target: mipsel-linux-musl
          - os: linux
            arch: riscv64
            target: riscv64-linux-musl
          - os: freebsd
            arch: amd64
            target: x86_64-freebsd
          - os: freebsd
            arch: arm64
            target: aarch64-freebsd
          - os: freebsd
            arch: "386"
            target: x86-freebsd
          - os: freebsd
            arch: arm
            target: arm-freebsd
          - os: darwin
            arch: amd64
            target: x86_64-macos
          - os: darwin
            arch: arm64
            target: aarch64-macos
          - os: windows
            arch: amd64
            target: x86_64-windows-gnu
          - os: windows
            arch: arm64
            target: aarch64-windows-gnu
          - os: windows
            arch: "386"
            target: x86-windows-gnu
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Install Zig
        run: |
          set -eu
          curl -fsSLO "https://ziglang.org/download/${ZIG_VERSION}/zig-x86_64-linux-${ZIG_VERSION}.tar.xz"
          echo "${ZIG_SHA256}  zig-x86_64-linux-${ZIG_VERSION}.tar.xz" | sha256sum -c -
          tar -xf "zig-x86_64-linux-${ZIG_VERSION}.tar.xz"
          echo "$PWD/zig-x86_64-linux-${ZIG_VERSION}" >> "$GITHUB_PATH"
      - name: Build
        run: |
          set -eu
          zig build -Doptimize=ReleaseSmall -Dversion=dev -Dtarget=${{ matrix.target }}
          mkdir -p dist
          binary="komari-agent"
          asset="komari-agent-${{ matrix.os }}-${{ matrix.arch }}"
          if [ "${{ matrix.os }}" = "windows" ]; then
            binary="komari-agent.exe"
            asset="${asset}.exe"
          fi
          cp "zig-out/bin/${binary}" "dist/${asset}"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: komari-agent-${{ matrix.os }}-${{ matrix.arch }}
          path: dist/komari-agent-${{ matrix.os }}-${{ matrix.arch }}*
          if-no-files-found: error

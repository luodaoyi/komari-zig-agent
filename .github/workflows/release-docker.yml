name: Publish Docker Image

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2
      - run: |
          VERSION="${{ github.event.release.tag_name }}"
          [ -n "$VERSION" ] || VERSION="${{ github.sha }}"
          zig build -Doptimize=ReleaseSmall -Dversion="$VERSION" -Dtarget=x86_64-linux-musl
          cp zig-out/bin/komari-agent komari-agent-linux-amd64
          zig build -Doptimize=ReleaseSmall -Dversion="$VERSION" -Dtarget=aarch64-linux-musl
          cp zig-out/bin/komari-agent komari-agent-linux-arm64
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ github.event.release.tag_name }}
            type=raw,value=latest
      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

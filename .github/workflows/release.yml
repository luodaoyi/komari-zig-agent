name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag or version, for example v0.1.0 or 0.1.0"
        required: true

permissions:
  contents: write

env:
  ZIG_VERSION: 0.15.2

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Resolve and create tag
        id: resolve
        env:
          RAW_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          IS_MANUAL: ${{ github.event_name == 'workflow_dispatch' }}
        run: |
          set -eu
          tag="${RAW_TAG#refs/tags/}"
          case "$tag" in
            v*) ;;
            *) tag="v${tag}" ;;
          esac
          case "$tag" in
            v[0-9]*.[0-9]*.[0-9]*) ;;
            *)
              echo "Release tag must look like v0.1.0" >&2
              exit 1
              ;;
          esac
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

          if [ "$IS_MANUAL" = "true" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git fetch --tags --force
            current="$(git rev-parse HEAD)"
            if git rev-parse -q --verify "refs/tags/${tag}" >/dev/null; then
              existing="$(git rev-list -n 1 "${tag}")"
              if [ "$existing" != "$current" ]; then
                echo "Tag ${tag} already exists at ${existing}, not current commit ${current}" >&2
                exit 1
              fi
            else
              git tag -a "$tag" -m "Release $tag"
              git push origin "refs/tags/${tag}"
            fi
          fi

  build:
    runs-on: ubuntu-latest
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            arch: amd64
            target: x86_64-linux-musl
          - os: linux
            arch: arm64
            target: aarch64-linux-musl
          - os: linux
            arch: "386"
            target: x86-linux-musl
          - os: linux
            arch: arm
            target: arm-linux-musleabi
          - os: linux
            arch: mips
            target: mips-linux-musl
          - os: linux
            arch: mipsel
            target: mipsel-linux-musl
          - os: linux
            arch: riscv64
            target: riscv64-linux-musl
          - os: freebsd
            arch: amd64
            target: x86_64-freebsd
          - os: freebsd
            arch: arm64
            target: aarch64-freebsd
          - os: freebsd
            arch: "386"
            target: x86-freebsd
          - os: freebsd
            arch: arm
            target: arm-freebsd
          - os: darwin
            arch: amd64
            target: x86_64-macos
          - os: darwin
            arch: arm64
            target: aarch64-macos
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.tag }}
      - name: Install Zig
        run: |
          set -eu
          curl -fsSLO "https://ziglang.org/download/${ZIG_VERSION}/zig-x86_64-linux-${ZIG_VERSION}.tar.xz"
          tar -xf "zig-x86_64-linux-${ZIG_VERSION}.tar.xz"
          echo "$PWD/zig-x86_64-linux-${ZIG_VERSION}" >> "$GITHUB_PATH"
      - name: Build
        run: |
          set -eu
          zig build -Doptimize=ReleaseSmall -Dversion=${{ needs.prepare.outputs.tag }} -Dtarget=${{ matrix.target }}
          mkdir -p dist
          cp zig-out/bin/komari-agent dist/komari-agent-${{ matrix.os }}-${{ matrix.arch }}
      - uses: actions/upload-artifact@v4
        with:
          name: komari-agent-${{ matrix.os }}-${{ matrix.arch }}
          path: dist/komari-agent-${{ matrix.os }}-${{ matrix.arch }}
          if-no-files-found: error

  publish:
    runs-on: ubuntu-latest
    needs: [prepare, build]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.tag }}
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.prepare.outputs.tag }}
        run: |
          set -eu
          if ! gh release view "$TAG" >/dev/null 2>&1; then
            gh release create "$TAG" --title "$TAG" --generate-notes
          fi
          gh release upload "$TAG" dist/komari-agent-* --clobber
